<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet">

    <title>furfind Pet Info</title>
    <link rel="stylesheet" href="furfind.css">
    <link rel="icon" type="image/png" href="images/Furfind-icon.png">
</head>
<body>

     <section class="animal-details-container">

        <div class="logo-1">
            <img src="images/Furfind logo.png" alt="Fur Find Logo">
        </div>

        <div class="left-section-animal">
            <div class="animal-image-card">
                <img id="petImage">
            </div>

            <a href="pets.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>
        </div>

         <div class="right-section-animal">

            <h1 class="animal-name">
            <span id="petName"></span>
            <span class="paw"> <i class="fa-solid fa-paw"></i></span>
            </h1>

            <div class="info-row">
                <span class="label">Age:</span>
                <span class="value" id="petAge"></span>
            </div>

            <div class="info-row">
                <span class="label">Sex:</span>
                <span class="value" id="petSex"></span>
            </div>

            <p class="description" id="petDescription"></p>

                        <div class="status-row">
                <span class="label">Health Condition:</span>
                <span class="value" id="petHealth"></span>
            </div>

            <div class="status-row">
                <span class="label">Vaccination Status:</span>
                <span class="value" id="petVaccination"></span>
            </div>

            <div class="status-row">
                <span class="label">Adoption Status:</span>
                <span class="value" id="petAdoption"></span>
            </div>

           
        <div class="adopt-container">

        <div id="adoptButtonContainer"></div>

        <div id="adoptBadgeContainer"></div>

</div>
</section>

    
<script src="pets-info.js"></script>
</body>
</html>
